  <!-- Venn background (image layer) -->
  <image id="venn-bg" xlink:href="venn-bg.png" x="0" y="0" width="1672" height="941"/>

  <!-- Annotation: подпись-описание сверху -->
  <g id="ornament">
    <text x="836" y="40" text-anchor="middle" fill="#c8b68a"
          font-family="Playfair Display, Georgia, serif" font-style="italic"
          font-size="18">
      Пересекающиеся области показывают возможные идеологические связи
    </text>
    <text x="836" y="62" text-anchor="middle" fill="#c8b68a"
          font-family="Playfair Display, Georgia, serif" font-style="italic"
          font-size="18">
      и участие партий в нескольких направлениях политической жизни.
    </text>
  </g>

