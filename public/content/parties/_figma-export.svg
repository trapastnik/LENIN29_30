      <g transform="translate(14 14) scale(1.0)" color="#CC2E2E"><path d="M12 2l2.9 6.9L22 10l-5.3 4.6L18.2 22 12 18.3 5.8 22l1.5-7.4L2 10l7.1-1.1L12 2z"/></g>
    </g>
    <text x="0" y="0" text-anchor="middle" fill="#CC2E2E" font-family="Playfair Display, Georgia, serif" font-size="22" font-weight="700" letter-spacing="3">КРАСНЫЕ</text>
    <g transform="translate(0 24)">
      <rect x="-42" y="-16" width="84" height="28" rx="14" fill="none" stroke="#CC2E2E" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#CC2E2E" font-family="Source Serif Pro, serif" font-size="14">Справка</text>
