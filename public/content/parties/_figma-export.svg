      <g transform="translate(14 14) scale(1.0)" color="#B36BA8"><g><circle cx="9" cy="8" r="3.2"/><circle cx="15" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.5-6 5.5-6s5.5 2.7 5.5 6M9.5 20c0-3.3 2.5-6 5.5-6s5.5 2.7 5.5 6" fill="none" stroke="currentColor" stroke-width="1.8"/></g></g>
    </g>
    <text x="0" y="0" text-anchor="middle" fill="#B36BA8" font-family="Playfair Display, Georgia, serif" font-size="22" font-weight="700" letter-spacing="3">РЕВОЛЮЦИОННАЯ ДЕМОКРАТИЯ</text>
    <g transform="translate(0 24)">
      <rect x="-42" y="-16" width="84" height="28" rx="14" fill="none" stroke="#B36BA8" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#B36BA8" font-family="Source Serif Pro, serif" font-size="14">Справка</text>
