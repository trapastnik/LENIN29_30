server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # MIME для наших ресурсов
  location ~* \.otf$  { default_type font/otf;  add_header Cache-Control "public, max-age=2592000"; }
  location ~* \.woff$ { default_type font/woff; add_header Cache-Control "public, max-age=2592000"; }
  location ~* \.woff2$ { default_type font/woff2; add_header Cache-Control "public, max-age=2592000"; }
  location ~* \.svg$  { default_type image/svg+xml; }
  location ~* \.json$ { default_type application/json; }

  # SPA-корень → экспозиция
  location = / { return 302 /expo/; }

  # Кеш для статики
  location ~* \.(png|jpg|jpeg|webp|mp4|webm)$ {
    expires 7d;
    add_header Cache-Control "public, must-revalidate";
  }

  # HTML — без кеша (важно: index.html содержит inline-скрипты для in-browser Babel)
  location ~* \.html?$ { add_header Cache-Control "no-cache"; }

  # JSX/JS-исходники для in-browser Babel — тоже без кеша.
  # (Vite не процессит /expo/ — там React+Babel-in-browser, и Babel
  # агрессивно кеширует скомпилированный jsx в IndexedDB; если jsx-файлы
  # отдавать с обычным max-age, Safari может крутить старую версию даже
  # после деплоя. См. memory `feedback_brand_link_caching`.)
  location ~* \.(jsx|js)$ {
    add_header Cache-Control "no-cache";
    types { application/javascript js; text/babel jsx; }
  }

  location / { try_files $uri $uri/ =404; }
}
